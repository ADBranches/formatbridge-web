services:
  postgres:
    image: postgres:16
    container_name: formatbridge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: formatbridge_db
      POSTGRES_USER: formatbridge_user
      POSTGRES_PASSWORD: formatbridge_dev_password
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: formatbridge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
